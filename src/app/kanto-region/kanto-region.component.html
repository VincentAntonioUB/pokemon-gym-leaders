<section class="region-section">
    <h2>Kanto Gym Leaders</h2>

    <div class="card-grid">
      @for (leader of leaders(); track leader.name) {
        <div class="card">
          <h3>{{ leader.name }}</h3>
          <p><strong>Location:</strong> {{ leader.location }}</p>
          <p><strong>Badge:</strong> {{ leader.badge }}</p>
          <ul>
            @for (member of leader.team; track member.pokemon) {
              <li>{{ member.pokemon }} – Lv. {{ member.level }}</li>
            }
          </ul>
          
        </div>
      }
    </div>
  </section>
